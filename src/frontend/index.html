<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Маршрут</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 586px; width: 1375px;}
    </style>
</head>
<body>
    <div class="map-wrapper">
        <div id="map"></div>
    </div>

    <div class="container">
        <div class="card">
            <h3>Генерация точек</h3>

            <div class="field">
                <label>Число точек</label>
                <input type="text" id="pointsInput" placeholder="5">
            </div>

            <div class="field multi">
                <label>Центр доставки</label>

                <div class="coords">
                    <div class="coord-row">
                        <span>W</span>
                        <input type="text" id="westInput" placeholder="20.22">
                    </div>

                    <div class="coord-row">
                        <span>N</span>
                        <input type="text" id="northInput" placeholder="20.22">
                    </div>
                </div>
            </div>

            <div class="field">
                <label>Радиус поиска (км)</label>
                <input type="text" id="radInput" placeholder="50">
            </div>

            <div class="toggle">
                <span>Обратный путь</span>
                <div class="switch"></div>
            </div>

            <button onclick="extractText()">Сгенерировать точки</button>
        </div>

        <div class="card small">
            <button>Построить маршрут</button>
            <p>40 км &nbsp;&nbsp; 50 мин</p>
        </div>

        <div class="card small green">
            <button>Оптимизировать маршрут</button>
            <p>15 км &nbsp;&nbsp; 15 мин</p>
        </div>

    </div>

    <div class="improvement">
        <span>-15 км &nbsp;&nbsp; -15 мин</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./js/map.js"></script>  
    <script type="module" src="./js/app.js"></script>
</body>
</html>
